<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mode Hors-ligne - SmartSchool</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            color: #343a40;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .icon {
            font-size: 4rem;
            color: #6c757d;
            margin-bottom: 20px;
        }
        h1 { margin-bottom: 10px; color: #1565C0; }
        p { margin-bottom: 30px; font-size: 1.1rem; }
        .btn {
            background-color: #1565C0;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            text-decoration: none;
        }
        .btn:hover { background-color: #0D47A1; }
    </style>
</head>
<body>
    <div class="icon">📡</div>
    <h1>Vous êtes hors-ligne</h1>
    <p>Il semble que vous ayez perdu votre connexion internet.<br>Vérifiez votre réseau et réessayez.</p>
    <button onclick="window.location.reload()" class="btn">Réessayer</button>
</body>
</html>
