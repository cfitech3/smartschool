{% if alertes %}
<div class="alertes-bloc" style="margin-bottom:16px;">
  {% for alerte in alertes %}
  <div class="alerte alerte-{{ alerte.niveau }}" style="
    display:flex;align-items:center;gap:12px;
    padding:12px 16px;border-radius:10px;margin-bottom:8px;
    {% if alerte.niveau == 'danger' %}
      background:var(--bg-danger);border-left:4px solid var(--danger);
    {% elif alerte.niveau == 'warning' %}
      background:#FFF8E1;border-left:4px solid #F9A825;
    {% else %}
      background:var(--bg-info, #E3F2FD);border-left:4px solid var(--primary);
    {% endif %}
  ">
    <span style="font-size:22px;flex-shrink:0;">{{ alerte.icone }}</span>
    <div style="flex:1;min-width:0;">
      <div style="font-weight:700;font-size:13px;
        {% if alerte.niveau == 'danger' %}color:var(--danger);
        {% elif alerte.niveau == 'warning' %}color:#F57F17;
        {% else %}color:var(--primary);{% endif %}
      ">{{ alerte.titre }}</div>
      <div style="font-size:12px;color:var(--text-muted);margin-top:2px;">{{ alerte.detail }}</div>
    </div>
    <a href="{{ alerte.url }}" style="
      flex-shrink:0;padding:5px 12px;border-radius:6px;font-size:12px;font-weight:600;
      text-decoration:none;
      {% if alerte.niveau == 'danger' %}background:var(--danger);color:#fff;
      {% elif alerte.niveau == 'warning' %}background:#F9A825;color:#fff;
      {% else %}background:var(--primary);color:#fff;{% endif %}
    ">Voir →</a>
  </div>
  {% endfor %}
</div>
{% endif %}
